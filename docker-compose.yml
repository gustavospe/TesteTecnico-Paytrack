services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paytrack-sync-prod
    profiles: ['prod']
    ports:
      - "3000:3000"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PORT=3000
      - API_URL=https://randomuser.me/api
      - API_RESULTS=150
      - DB_PATH=/app/database/users.db
    restart: unless-stopped
    networks:
      - paytrack-network

  # ========== DESENVOLVIMENTO ==========
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paytrack-sync-dev
    profiles: ['dev']
    ports:
      - "3333:3333"
    volumes:
      - ./src:/app/src
      - ./database:/app/database
      - ./logs:/app/logs
      # node_modules é gerenciado pelo container, não montado do host
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3333
      - API_URL=https://randomuser.me/api
      - API_RESULTS=150
      - DB_PATH=/app/database/users.db
    restart: unless-stopped
    networks:
      - paytrack-network
    command: npm run dev

networks:
  paytrack-network:
    driver: bridge

volumes:
  node_modules:
