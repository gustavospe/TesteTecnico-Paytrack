services:

# Prod Profile
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paytrack-sync-prod
    profiles: ['prod']
    ports:
      - "3000:3000"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - paytrack-network

# Dev Profile
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paytrack-sync-dev
    profiles: ['dev']
    ports:
      - "3333:3333"
    volumes:
      - ./src:/app/src
      - ./database:/app/database
      - ./logs:/app/logs
      # node_modules é gerenciado pelo container, não montado do host
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3333
    restart: unless-stopped
    networks:
      - paytrack-network
    command: npm run dev

networks:
  paytrack-network:
    driver: bridge

volumes:
  node_modules:
